name: Deploy Next.js Web App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build --workspace apps/web
        env:
          NEXT_PUBLIC_API_URL: https://manikyam-api.onrender.com/api # Replace with your deployed backend API URL when available
          # Fallback values will be used if the below are not specified
          NEXT_PUBLIC_SHOP_PHONE: "+919581754757"
          NEXT_PUBLIC_WHATSAPP_NUMBER: "919581754757"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
